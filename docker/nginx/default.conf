server {
    listen 80;
    server_name localhost;

    # Root project Anda
    root /var/www/html;
    index index.php index.html;

    # Charset
    charset utf-8;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # ─── Handle semua request ─────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ─── PHP-FPM ──────────────────────────────────────────────────
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    # ─── Blokir akses ke file sensitif ───────────────────────────
    location ~ /\.ht {
        deny all;
    }

    location ~ /\.env {
        deny all;
    }

    # ─── Static files caching ─────────────────────────────────────
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff|woff2|ttf|svg)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
    location /login {
    rewite ^ /PerpusPHP/login.php last;
    }
    location /dashboard {
    rewrite ^ /PerpusPHP/home.php last;
}

location /PerpusPHP/kategori {
    rewrite ^ /PerpusPHP/modul_kategori/list-kategori.php last;
}

location /PerpusPHP/buku {
    rewrite ^ /PerpusPHP/modul_buku/list-buku.php last;
}

location /PerpusPHP/anggota {
    rewrite ^ /PerpusPHP/modul_anggota/list-anggota.php last;
}

location /PerpusPHP/peminjaman {
    rewrite ^ /PerpusPHP/modul_peminjaman/pinjam-data.php last;
}

location /PerpusPHP/pengembalian {
    rewrite ^ /PerpusPHP/modul_pengembalian/list-pengembalian.php last;
}

location /PerpusPHP/logout {
    rewrite ^ /PerpusPHP/logout.php last;
}

}