
services:

  # ─── Nginx ────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: perpus_nginx
    ports:
      - "80:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - perpus_network
    restart: unless-stopped

  # ─── PHP-FPM ──────────────────────────────────────────────────────────────
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: perpus_php
    volumes:
      - ./:/var/www/html
    depends_on:
      - mysql
    networks:
      - perpus_network
    restart: unless-stopped

  # ─── MySQL ────────────────────────────────────────────────────────────────
  mysql:
    image: mysql:9.5.0
    container_name: db_perpus
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: ${DB_NAME:-db_perpus}
      MYSQL_USER: ${DB_USER:-perpus_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-perpus_pass}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - perpus_network
    restart: unless-stopped

  # ─── phpMyAdmin (opsional, untuk management DB) ───────────────────────────
  phpmyadmin:
    image: phpmyadmin:5.2.3
    container_name: perpus_phpmyadmin
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: ${DB_USER:-perpus_user}
      PMA_PASSWORD: ${DB_PASSWORD:-perpus_pass}
    depends_on:
      - mysql
    networks:
      - perpus_network
    restart: unless-stopped

networks:
  perpus_network:
    driver: bridge

volumes:
  mysql_data:
    driver: local